  #   volumes:
  #     - minio_data:/data
  #   restart: always
  #   networks:
  #     - betterbase-prod

  # --------------------------------------------------------------------------
  # Optional: Traefik reverse proxy (uncomment for automatic HTTPS)
  # --------------------------------------------------------------------------
  # traefik:
  #   image: traefik:v3.0
  #   command:
  #     - "--api.insecure=true"
