# ============================================================================
# Betterbase Docker Compose
#
# Development environment with PostgreSQL, Redis (for sessions), 
# and the Betterbase application.
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f app    # View app logs
#   docker-compose down           # Stop all services
#   docker-compose down -v        # Stop and remove volumes
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Betterbase Application
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.project
    ports:
      - "3000:3000"
    environment:
      # Database - connect to postgres service
      DATABASE_URL: postgres://betterbase:betterbase_secret@postgres:5432/betterbase
      
      # Auth
      AUTH_SECRET: ${AUTH_SECRET:-your-super-secret-key-min-32-chars-long-change-in-production}
      AUTH_URL: http://localhost:3000
      
      # Storage (local for development)
      STORAGE_PROVIDER: local
      STORAGE_PATH: /app/storage
      
      # Node environment
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "3000"
      
      # CORS
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      
    volumes:
      # Mount source for hot reload in development
      - ./src:/app/src
      # Storage volume for uploaded files
      - betterbase_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_started
    restart: unless-stopped
    networks:
      - betterbase-network

  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betterbase
      POSTGRES_PASSWORD: betterbase_secret
      POSTGRES_DB: betterbase
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize with schema on first run (optional)
      # - ./init-schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U betterbase -d betterbase"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - betterbase-network

  # --------------------------------------------------------------------------
  # Optional: MinIO for S3-compatible storage (development)
  # --------------------------------------------------------------------------
  # minio:
  #   image: minio/minio:latest
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   networks:
  #     - betterbase-network

  # --------------------------------------------------------------------------
  # Optional: Mailhog for email testing (development)
  # --------------------------------------------------------------------------
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   ports:
  #     - "1025:1025"  # SMTP
  #     - "8025:8025"  # Web UI
  #   networks:
  #     - betterbase-network

# ----------------------------------------------------------------------------
# Networks
# ----------------------------------------------------------------------------
networks:
  betterbase-network:
    driver: bridge

# ----------------------------------------------------------------------------
# Volumes
# ----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  betterbase_storage:
    driver: local
  # minio_data:
  #   driver: local
